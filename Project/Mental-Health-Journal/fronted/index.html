<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Mental Health Journal</title>

    <link rel="stylesheet"
        href="css/style.css">

    <link rel="preconnect"
        href="https://fonts.googleapis.com">

    <link rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
        rel="stylesheet">
</head>

<body>

    <div class="app-container">

        <!-- SIDEBAR -->

        <aside class="sidebar">

            <div class="logo">
                MindSpace
            </div>


            <nav class="navigation">

                <a href="#" class="nav-item active">
                    <span>▦</span>
                    Dashboard
                </a>

                <a href="#" class="nav-item">
                    <span>📖</span>
                    Journal
                </a>

                <a href="#" class="nav-item">
                    <span>📊</span>
                    Mood Trends
                </a>

                <a href="#" class="nav-item">
                    <span>📈</span>
                    Analytics
                </a>

                <a href="#" class="nav-item">
                    <span>🫁</span>
                    Breathing
                </a>

                <a href="#" class="nav-item">
                    <span>🧑‍⚕️</span>
                    Therapists
                </a>

                <a href="#" class="nav-item">
                    <span>👤</span>
                    Profile
                </a>

                <a href="#" class="nav-item">
                    <span>⚙️</span>
                    Settings
                </a>

            </nav>


            <a href="#" class="nav-item logout">
                <span>↪</span>
                Logout
            </a>

        </aside>


        <!-- MAIN CONTENT -->

        <main class="main-content">


            <!-- TOP SECTION -->

            <section class="top-section">


                <!-- WELCOME -->

                <div class="welcome-section">

                    <h1>
                        Welcome back 👋
                    </h1>

                    <p class="subtitle">
                        How are you feeling today?
                    </p>


                    <!-- MOOD SELECTOR -->

                    <div class="mood-selector">

                        <button class="mood-btn"
                            data-mood="happy"
                            data-score="5">

                            😊

                        </button>


                        <button class="mood-btn"
                            data-mood="good"
                            data-score="4">

                            🙂

                        </button>


                        <button class="mood-btn"
                            data-mood="neutral"
                            data-score="3">

                            😐

                        </button>


                        <button class="mood-btn"
                            data-mood="sad"
                            data-score="2">

                            😔

                        </button>


                        <button class="mood-btn"
                            data-mood="awful"
                            data-score="1">

                            😢

                        </button>

                    </div>


                    <!-- JOURNAL FORM -->

                    <div class="journal-card">

                        <h2>
                            Add Today's Journal
                        </h2>


                        <textarea
                            id="journalText"
                            placeholder="Write about your day, thoughts, and feelings...">
                        </textarea>


                        <button
                            id="addJournalBtn"
                            class="add-btn">

                            Add Journal

                        </button>

                    </div>

                </div>


                <!-- CALENDAR -->

                <div class="calendar-card">

                    <h2>
                        Calendar
                    </h2>

                    <div class="streak">

                        🔥

                        <strong>
                            <span id="streakCount">
                                0
                            </span>
                            Day Streak
                        </strong>

                    </div>


                    <div class="calendar-header">

                        <button id="prevMonth">
                            ‹
                        </button>

                        <h3 id="monthYear">
                            July 2026
                        </h3>

                        <button id="nextMonth">
                            ›
                        </button>

                    </div>


                    <div class="calendar-weekdays">

                        <span>Sun</span>
                        <span>Mon</span>
                        <span>Tue</span>
                        <span>Wed</span>
                        <span>Thu</span>
                        <span>Fri</span>
                        <span>Sat</span>

                    </div>


                    <div
                        id="calendarDays"
                        class="calendar-days">

                    </div>

                </div>

            </section>


            <!-- JOURNAL HISTORY -->

            <section class="history-section">

                <div class="section-header">

                    <h2>
                        Your Journal
                    </h2>

                    <button>
                        View All
                    </button>

                </div>


                <div
                    id="journalList"
                    class="journal-list">

                </div>

            </section>

        </main>

    </div>


    <script src="js/app.js"></script>

</body>

</html>
